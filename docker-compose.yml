name: ${DOCKER_COMPOSE_NAMESPACE:-dnmp}
services:
  nginx:
    profiles: [ nginx ]
    extends:
      service: nginx
      file: docker-compose.${DIST_VERSION:-debian}.yml
    build:
      context: nginx
      args:
        VERSION: ${NGINX_VERSION:-stable}
    restart: unless-stopped
    network_mode: host
    ulimits:
      nproc: 127607
      nofile:
        soft: 524288
        hard: 524288
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
      - ./nginx/cert:/etc/nginx/cert:rw,z
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/wordpress.conf:/etc/nginx/wordpress.conf:ro
      - ./nginx/ssl-cert-snakeoil.key:/etc/nginx/ssl-cert-snakeoil.key:ro
      - ./nginx/ssl-cert-snakeoil.pem:/etc/nginx/ssl-cert-snakeoil.pem:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./nginx/log:/var/log/nginx:rw,z
      - ./wwwroot:/wwwroot:ro,z
      - ./acme.sh:/root/.acme.sh:rw,z
      # 共享run
      - ./run:/var/run:rw,z
  php74:
    profiles: [ php74 ]
    extends:
      file: php/74/docker-compose.yml
      service: php74
  php74-crond:
    profiles: [ php74 ]
    extends:
      file: php/74/docker-compose.yml
      service: php74-crond
  php81:
    profiles: [ php81 ]
    extends:
      file: php/81/docker-compose.yml
      service: php81
  php81-crond:
    profiles: [ php81 ]
    extends:
      file: php/81/docker-compose.yml
      service: php81-crond
  php82:
    profiles: [ php82 ]
    extends:
      file: php/82/docker-compose.yml
      service: php82
  php82-crond:
    profiles: [ php82 ]
    extends:
      file: php/82/docker-compose.yml
      service: php82-crond
  php83:
    profiles: [ php83 ]
    extends:
      file: php/83/docker-compose.yml
      service: php83
  php83-crond:
    profiles: [ php83 ]
    extends:
      file: php/83/docker-compose.yml
      service: php83-crond
  php84:
    profiles: [ php84 ]
    extends:
      file: php/84/docker-compose.yml
      service: php84
  php84-crond:
    profiles: [ php84 ]
    extends:
      file: php/84/docker-compose.yml
      service: php84-crond
  php85:
    profiles: [ php85 ]
    extends:
      file: php/85/docker-compose.yml
      service: php85
  php85-crond:
    profiles: [ php85 ]
    extends:
      file: php/85/docker-compose.yml
      service: php85-crond
