name: ${DOCKER_COMPOSE_NAMESPACE:-dnmp}
services:
  php56:
    extends:
      service: php56
      file: docker-compose.${DIST_VERSION:-debian}.yml
    build:
      context: .
    restart: unless-stopped
    tmpfs:
      - /tmp
    volumes:
      - ../../run:/var/run:rw,z
      - ../../wwwroot:/wwwroot:rw,z
      - ./zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf:ro
      - ./crontabs:/var/spool/cron/crontabs
    network_mode: host
  php56-crond:
    extends:
      service: php56
    command: busybox crond -f -l 8
